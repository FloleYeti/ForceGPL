<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GPL vs Essence</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🔧 Correction débordement */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #eef2ff, #e0f7fa);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.app {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  margin: 0 auto;
}

.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  padding: 11px 11px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 700;
}

/* 🎯 Inputs centrés et propres */
input {
  width: 92%;
  padding: 14px;
  margin: 0 auto 14px auto;
  display: block;
  border-radius: 14px;
  border: 1px solid #ddd;
  font-size: 16px;
  text-align: center;
  background: #f9fafb;
  transition: 0.2s;
}

input:focus {
  outline: none;
  border-color: #6366f1;
  background: white;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

.result {
  margin-top: 20px;
  padding: 10px;
  border-radius: 20px;
  text-align: center;
  font-size: 15px;
  transition: all 0.3s ease;
}

.ok {
  background: linear-gradient(135deg, #e6f9f0, #d1fae5);
  color: #065f46;
}

.no {
  background: linear-gradient(135deg, #fdecec, #fee2e2);
  color: #7f1d1d;
}

.details {
  font-size: 13px;
  margin-top: 10px;
  opacity: 0.9;
}

.diff {
  margin-top: 12px;
  font-size: 16px;
  font-weight: 600;
}

.postit {
  margin-top: 18px;
  background: #fff9c4;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>

<div class="app">
  <div class="card">

    <h2>GPL vs Essence</h2>

    <input type="number" id="prixEssence" placeholder="Prix Essence €/L" step="0.01">
    <input type="number" id="prixGPL" placeholder="Prix GPL €/L" step="0.01">
    <input type="number" id="consoEssence" placeholder="Conso Essence L/100km" step="0.1">
    <input type="number" id="consoGPL" placeholder="Conso GPL L/100km" step="0.1">

    <div id="resultat"></div>

    <div class="postit">
      🧠 Le GPL est rentable si le coût /100 km est inférieur à l’essence  
      (+20 à 30% de conso en général)
    </div>

  </div>
</div>

<script>
const inputs = ["prixEssence","prixGPL","consoEssence","consoGPL"];
let timer;

window.onload = function() {
  inputs.forEach(id => {
    let val = localStorage.getItem(id);
    if (val) document.getElementById(id).value = val;
  });
  calculer();
};

inputs.forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    clearTimeout(timer);
    timer = setTimeout(calculer, 250);
  });
});

function calculer() {
  let prixE = Number(prixEssence.value);
  let prixG = Number(prixGPL.value);
  let consoE = Number(consoEssence.value);
  let consoG = Number(consoGPL.value);

  if ([prixE, prixG, consoE, consoG].some(v => isNaN(v) || v <= 0)) {
    document.getElementById("resultat").innerHTML = "";
    return;
  }

  localStorage.setItem("prixEssence", prixE);
  localStorage.setItem("prixGPL", prixG);
  localStorage.setItem("consoEssence", consoE);
  localStorage.setItem("consoGPL", consoG);

  let coutE = prixE * consoE;
  let coutG = prixG * consoG;
  let diff = coutE - coutG;

  let rentable = diff > 0;

  document.getElementById("resultat").innerHTML = `
    <div class="result ${rentable ? 'ok' : 'no'}">
      ${rentable ? '✅ GPL rentable' : '❌ GPL non rentable'}
      
      <div class="details">
        ${coutE.toFixed(2)} €/100km (essence)<br>
        ${coutG.toFixed(2)} €/100km (GPL)
      </div>

      <div class="diff">
        ${rentable 
          ? `💸 Économie : ${diff.toFixed(2)} €/100 km`
          : `⚠️ Surcoût : ${Math.abs(diff).toFixed(2)} €/100 km`}
      </div>
    </div>
  `;
}
</script>

</body>
</html>
